<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Coin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white">
<div id="app" class="min-h-screen flex items-center justify-center p-4"></div>
<script>
  const supabase = supabase.createClient(
    'https://sibjlexvhdffethqkftp.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpYmpsZXh2aGRmZmV0aHFrZnRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjUyMDEsImV4cCI6MjA5NzEwMTIwMX0.FAfBxA74Ln8-40dXKTBEkSByEc419N9TknjPRZLJZbg'
  );

  async function render() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      document.getElementById('app').innerHTML = `
        <div class="text-center">
          <h1 class="text-4xl font-bold text-yellow-500">Creator Coin</h1>
          <div class="mt-6 space-y-3 w-64 mx-auto">
            <input id="email" class="w-full p-2 rounded bg-gray-800 border border-gray-600" placeholder="Email">
            <input id="password" type="password" class="w-full p-2 rounded bg-gray-800 border border-gray-600" placeholder="Password">
            <button onclick="login()" class="w-full bg-yellow-500 text-black p-2 rounded font-bold">Login</button>
            <button onclick="signup()" class="w-full border border-yellow-500 p-2 rounded">Sign Up</button>
          </div>
        </div>
      `;
      return;
    }
    const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
    document.getElementById('app').innerHTML = `
      <div class="text-center">
        <h1 class="text-3xl font-bold">Hello ${profile?.username || session.user.email}</h1>
        <p class="text-2xl text-yellow-500 mt-4">${profile?.ccr_balance || 0} CCR</p>
        <p class="text-gray-400 text-sm mt-2">Wallet: ${profile?.wallet_id || 'N/A'}</p>
        <button onclick="logout()" class="mt-6 bg-red-600 px-4 py-2 rounded">Logout</button>
      </div>
    `;
  }

  window.login = async () => {
    const email = document.getElementById('email').value;
    const pwd = document.getElementById('password').value;
    const { error } = await supabase.auth.signInWithPassword({ email, password: pwd });
    if (error) alert(error.message);
    else render();
  };
  window.signup = async () => {
    const email = document.getElementById('email').value;
    const pwd = document.getElementById('password').value;
    const { error } = await supabase.auth.signUp({ email, password: pwd });
    if (error) alert(error.message);
    else { alert('Account created! 400 CCR added.'); render(); }
  };
  window.logout = async () => { await supabase.auth.signOut(); render(); };
  render();
</script>
</body>
</html>
